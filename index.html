<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script src="entidades/Usuario.js"></script>
<script src="infra/database.js"></script>
<script src="entidades/Bebida.js"></script>
<script src="entidades/RegistroVenda.js"></script> 
<script src="services/BarManager.js"></script>
<script src="services/UsuarioManager.js"></script> 
<script>
    console.log("--------- Inicializando o sistema de estoque do bar --------");

    if (BarManager.buscarEstoque().length === 0) {
            BarManager.adicionarBebida('Cerveja Skol 600ml', 120, 9.50);
            BarManager.adicionarBebida('Cerveja Heineken 330ml', 80, 12.00);
            BarManager.adicionarBebida('Combo Vodka + Energético', 15, 150.00);
        }

    console.log("Estoque atual:");
    console.table(BarManager.buscarEstoque());

    console.log("--------- Registrando um usuário para testes de login ---------");
   
    let usuario =  UsuarioManager.registrarUsuario('Alisson', 'alissonf94', 'senha1234');
    
    console.log(`Usuário registrado:  ${usuario.username}`);
    
    console.log("--------- iniciando login ---------");
    
    if(UsuarioManager.login(usuario.username, usuario.password)){
        console.log("Login bem-sucedido!");
        
        console.log(" --------- Inciando uma compra ---------");   
        BarManager.venderBebida(3, 15, usuario.id);
        
        console.log(" --------- Atualizando status da bebida ---------")
        BarManager.atualizarStatusBebida(3);
       
        console.log(" --------- Buscando historico de compras do cliente ---------");
        console.table(BarManager.buscarHistoricoDeComprasPorUsuario(usuario.id));

        console.log(" --------- Listando estoque atualizado ---------");
        console.table(BarManager.buscarEstoque());
    }
    else{
        console.log("Falha no login. Verifique as credenciais e tente novamente.");
    }

    console.log("--------- Buscando bebida por id ---------");
    let bebida = BarManager.buscarBebidaPorId(1);
    console.log(`Bebida encontrada: ${bebida.nome}, Preço: R$${bebida.preco}, Quantidade: ${bebida.quantidade}`);

    console.log("--------- Removendo bebida por id ---------");
    if(BarManager.removerBebidaPorId(2)){
        console.log(`Bebida com ID ${2} removida com sucesso!`);
    }

    console.log("--------- Listando estoque atualizado após remoção ---------");
    console.table(BarManager.buscarEstoque());

    console.log("--------- Atualizando preco de uma bebida  ---------");
    if(BarManager.atualizarPreco(1, 17.00)){
        console.log("Preço atualizado com sucesso!");
    }

    console.log("--------- Listando estoque atualizado após atualização de preço ---------");
    console.table(BarManager.buscarEstoque());

</script>
</html>
